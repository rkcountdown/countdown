<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tasks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --paper: #fdfaf4;
    --col-bg: #ede8e0;
    --ink: #1a1612;
    --ink-muted: #6b6258;
    --accent: #c84b2f;
    --accent-light: #f5e8e4;
    --done: #4a7c59;
    --done-light: #e4efe7;
    --border: #d4cdc3;
    --shadow: rgba(26,22,18,0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 36px 24px 60px;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .date-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 5px;
  }

  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .save-indicator {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 10px;
    transition: all 0.3s;
    opacity: 0;
  }
  .save-indicator.saving { opacity:1; background:#e8e4dc; color:var(--ink-muted); }
  .save-indicator.saved  { opacity:1; background:var(--done-light); color:var(--done); }
  .save-indicator.error  { opacity:1; background:var(--accent-light); color:var(--accent); }

  .add-col-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--ink-muted);
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .add-col-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Board ── */
  .board {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    overflow-x: auto;
    padding-bottom: 16px;
  }

  /* ── Column ── */
  .column {
    background: var(--col-bg);
    border-radius: 12px;
    width: 280px;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: box-shadow 0.2s;
  }
  .column.col-drag-over { box-shadow: 0 0 0 2px var(--accent); }

  .col-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 14px 10px;
  }

  .col-title {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    cursor: text;
    min-width: 0;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .col-title:hover { background: rgba(0,0,0,0.05); }
  .col-title:focus { background: white; }

  .col-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    background: rgba(0,0,0,0.07);
    padding: 1px 7px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .col-delete-btn {
    background: transparent;
    border: none;
    color: var(--border);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.15s;
    line-height: 1;
    flex-shrink: 0;
  }
  .column:hover .col-delete-btn { opacity: 1; }
  .col-delete-btn:hover { color: var(--accent); }

  /* ── Add task bar ── */
  .add-bar {
    display: flex;
    gap: 6px;
    margin: 0 10px 10px;
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 5px 5px 10px;
    transition: border-color 0.2s;
  }
  .add-bar:focus-within { border-color: var(--accent); }

  .add-bar input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    min-width: 0;
  }
  .add-bar input::placeholder { color: var(--border); }

  .priority-select {
    border: none;
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-muted);
    cursor: pointer;
    outline: none;
    padding: 0 2px;
    flex-shrink: 0;
  }

  .add-task-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 5px;
    width: 26px;
    height: 26px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .add-task-btn:hover { background: #a83820; }
  .add-task-btn:active { transform: scale(0.93); }

  /* ── Task list inside column ── */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 10px 10px;
    min-height: 40px;
  }

  /* ── Task card ── */
  .task {
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 9px 10px;
    box-shadow: 0 1px 3px var(--shadow);
    animation: slideIn 0.18s ease;
    transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
    cursor: default;
  }
  .task:hover { border-color: #b8b0a4; }
  .task.completed { opacity: 0.55; background: var(--done-light); border-color: transparent; }
  .task.dragging  { opacity: 0.3; border-style: dashed; box-shadow: none; cursor: grabbing; }
  .task.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 0 2px var(--accent-light); }

  @keyframes slideIn {
    from { opacity:0; transform:translateY(-5px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .drag-handle {
    cursor: grab;
    color: var(--border);
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s;
    user-select: none;
    line-height: 1.4;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .task:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  .check-btn {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 9px;
    color: transparent;
    margin-top: 2px;
  }
  .task.completed .check-btn { background: var(--done); border-color: var(--done); color: white; }
  .check-btn:hover { border-color: var(--done); color: var(--done); }

  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 13px;
    line-height: 1.4;
    word-break: break-word;
  }
  .task.completed .task-text { text-decoration: line-through; color: var(--ink-muted); }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }

  .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .p-high   { background: var(--accent); }
  .p-medium { background: #e09a30; }
  .p-low    { background: var(--border); }

  .priority-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--ink-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .delete-btn {
    background: transparent;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 14px;
    padding: 1px 3px;
    border-radius: 3px;
    line-height: 1;
    transition: color 0.15s;
    opacity: 0;
    flex-shrink: 0;
  }
  .task:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--accent); }

  .col-empty {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--border);
    text-align: center;
    padding: 16px 0 8px;
    letter-spacing: 0.04em;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="date-label" id="dateLabel"></div>
    <h1>Daily Tasks</h1>
  </div>
  <div class="topbar-right">
    <span class="save-indicator" id="saveIndicator"></span>
    <button class="add-col-btn" id="addColBtn">+ Add column</button>
  </div>
</div>

<div class="board" id="board"></div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  var state = null;  // { columns: [{id, title, tasks:[{id,text,priority,done}]}], nextColId, nextTaskId }
  var dragTask = null;  // { taskId, fromColId }
  var saveTimer = null;

  var board        = document.getElementById('board');
  var addColBtn    = document.getElementById('addColBtn');
  var saveIndicator = document.getElementById('saveIndicator');
  var dateLabel    = document.getElementById('dateLabel');

  dateLabel.textContent = new Date().toLocaleDateString('en-GB', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });

  // ── Persistence ───────────────────────────────────────────────────────────
  function showSave(st, msg) {
    saveIndicator.textContent = msg;
    saveIndicator.className = 'save-indicator ' + st;
    if (st === 'saved') {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(function() { saveIndicator.className = 'save-indicator'; }, 2000);
    }
  }

  function save() {
    showSave('saving', 'saving\u2026');
    fetch('/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    }).then(function(r) {
      if (r.ok) showSave('saved', 'saved \u2713');
      else      showSave('error', 'save failed');
    }).catch(function() { showSave('error', 'server offline'); });
  }

  function loadFromServer() {
    fetch('/tasks')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        // Support both old format (tasks/nextId) and new format (columns)
        if (data.columns) {
          state = data;
        } else {
          // Migrate old flat task list into a single "Tasks" column
          state = defaultState();
          if (data.tasks && data.tasks.length) {
            state.columns[0].tasks = data.tasks;
            state.nextTaskId = data.nextId || 1;
          }
        }
        render();
      })
      .catch(function() {
        state = defaultState();
        render();
        board.insertAdjacentHTML('beforeend',
          '<p style="font-family:DM Mono,monospace;font-size:12px;color:#c84b2f;margin-top:12px">' +
          'Could not reach server \u2014 is server.py running? Showing defaults, changes won\u2019t be saved.</p>');
      });
  }

  function defaultState() {
    return {
      nextColId: 4,
      nextTaskId: 1,
      columns: [
        { id: 1, title: 'To Do',       tasks: [] },
        { id: 2, title: 'In Progress', tasks: [] },
        { id: 3, title: 'Done',        tasks: [] }
      ]
    };
  }

  // ── Column operations ─────────────────────────────────────────────────────
  function addColumn() {
    state.columns.push({ id: state.nextColId++, title: 'New Column', tasks: [] });
    save();
    render();
    // Auto-focus the new column title
    var titles = document.querySelectorAll('.col-title');
    var last = titles[titles.length - 1];
    if (last) { last.focus(); last.select(); }
  }

  function deleteColumn(colId) {
    var col = state.columns.find(function(c) { return c.id === colId; });
    if (col && col.tasks.length > 0) {
      if (!confirm('Delete "' + col.title + '" and all its tasks?')) return;
    }
    state.columns = state.columns.filter(function(c) { return c.id !== colId; });
    save();
    render();
  }

  function renameColumn(colId, newTitle) {
    var col = state.columns.find(function(c) { return c.id === colId; });
    if (col) col.title = newTitle || 'Untitled';
    save();
  }

  // ── Task operations ───────────────────────────────────────────────────────
  function addTask(colId, text, priority) {
    var col = state.columns.find(function(c) { return c.id === colId; });
    if (!col) return;
    col.tasks.push({ id: state.nextTaskId++, text: text, priority: priority, done: false });
    save();
    render();
  }

  function toggleTask(colId, taskId) {
    var col = state.columns.find(function(c) { return c.id === colId; });
    if (!col) return;
    var t = col.tasks.find(function(t) { return t.id === taskId; });
    if (t) t.done = !t.done;
    save();
    render();
  }

  function deleteTask(colId, taskId) {
    var col = state.columns.find(function(c) { return c.id === colId; });
    if (!col) return;
    col.tasks = col.tasks.filter(function(t) { return t.id !== taskId; });
    save();
    render();
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    board.innerHTML = '';
    state.columns.forEach(function(col) {
      board.appendChild(makeColumn(col));
    });
  }

  function makeColumn(col) {
    var colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.colId = col.id;

    // Header
    var header = document.createElement('div');
    header.className = 'col-header';

    var titleEl = document.createElement('input');
    titleEl.className = 'col-title';
    titleEl.type = 'text';
    titleEl.value = col.title;
    titleEl.maxLength = 40;
    titleEl.addEventListener('blur', function() { renameColumn(col.id, titleEl.value.trim()); });
    titleEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') titleEl.blur(); });

    var countEl = document.createElement('span');
    countEl.className = 'col-count';
    countEl.textContent = col.tasks.length;

    var delColBtn = document.createElement('button');
    delColBtn.className = 'col-delete-btn';
    delColBtn.title = 'Delete column';
    delColBtn.textContent = '\u00D7';
    delColBtn.addEventListener('click', function() { deleteColumn(col.id); });

    header.appendChild(titleEl);
    header.appendChild(countEl);
    header.appendChild(delColBtn);
    colEl.appendChild(header);

    // Add-task bar
    var addBar = document.createElement('div');
    addBar.className = 'add-bar';

    var input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Add task\u2026';
    input.maxLength = 200;

    var pSel = document.createElement('select');
    pSel.className = 'priority-select';
    ['low','medium','high'].forEach(function(p) {
      var o = document.createElement('option');
      o.value = p; o.textContent = p === 'medium' ? 'med' : p;
      if (p === 'medium') o.selected = true;
      pSel.appendChild(o);
    });

    var addBtn2 = document.createElement('button');
    addBtn2.className = 'add-task-btn';
    addBtn2.textContent = '+';
    addBtn2.title = 'Add task';

    function doAdd() {
      var txt = input.value.trim();
      if (!txt) return;
      addTask(col.id, txt, pSel.value);
      input.value = '';
      input.focus();
    }
    addBtn2.addEventListener('click', doAdd);
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') doAdd(); });

    addBar.appendChild(input);
    addBar.appendChild(pSel);
    addBar.appendChild(addBtn2);
    colEl.appendChild(addBar);

    // Task list
    var listEl = document.createElement('div');
    listEl.className = 'task-list';
    listEl.dataset.colId = col.id;

    if (col.tasks.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'col-empty';
      empty.textContent = 'empty';
      listEl.appendChild(empty);
    } else {
      col.tasks.forEach(function(t) {
        listEl.appendChild(makeTask(t, col.id));
      });
    }

    // Column-level drop (drop onto empty space)
    listEl.addEventListener('dragover', function(e) {
      e.preventDefault();
      colEl.classList.add('col-drag-over');
    });
    listEl.addEventListener('dragleave', function(e) {
      if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('col-drag-over');
    });
    listEl.addEventListener('drop', function(e) {
      e.preventDefault();
      colEl.classList.remove('col-drag-over');
      if (!dragTask) return;
      // Move to end of this column (if not already here and not dropped on a task)
      if (e.target === listEl || e.target.classList.contains('col-empty')) {
        moveTaskToColumn(dragTask.taskId, dragTask.fromColId, col.id, null);
      }
    });

    colEl.appendChild(listEl);
    return colEl;
  }

  function makeTask(t, colId) {
    var el = document.createElement('div');
    el.className = 'task' + (t.done ? ' completed' : '');
    el.draggable = true;
    el.dataset.taskId = t.id;

    el.innerHTML =
      '<span class="drag-handle" title="Drag to move">\u22EE</span>' +
      '<button class="check-btn" title="Toggle done">\u2713</button>' +
      '<div class="task-body">' +
        '<div class="task-text">' + escHtml(t.text) + '</div>' +
        '<div class="task-meta">' +
          '<span class="priority-dot p-' + t.priority + '"></span>' +
          '<span class="priority-label">' + t.priority + '</span>' +
        '</div>' +
      '</div>' +
      '<button class="delete-btn" title="Delete">\u00D7</button>';

    el.querySelector('.check-btn').addEventListener('click', function() { toggleTask(colId, t.id); });
    el.querySelector('.delete-btn').addEventListener('click', function() { deleteTask(colId, t.id); });

    // Drag events
    el.addEventListener('dragstart', function(e) {
      dragTask = { taskId: t.id, fromColId: colId };
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(function() { el.classList.add('dragging'); }, 0);
    });
    el.addEventListener('dragend', function() {
      el.classList.remove('dragging');
      document.querySelectorAll('.task').forEach(function(n) { n.classList.remove('drag-over'); });
      document.querySelectorAll('.column').forEach(function(n) { n.classList.remove('col-drag-over'); });
      dragTask = null;
    });
    el.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.stopPropagation();
      document.querySelectorAll('.task').forEach(function(n) { n.classList.remove('drag-over'); });
      if (!dragTask || dragTask.taskId === t.id) return;
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', function() { el.classList.remove('drag-over'); });
    el.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      el.classList.remove('drag-over');
      if (!dragTask || dragTask.taskId === t.id) return;
      moveTaskToColumn(dragTask.taskId, dragTask.fromColId, colId, t.id);
    });

    return el;
  }

  function moveTaskToColumn(taskId, fromColId, toColId, beforeTaskId) {
    var fromCol = state.columns.find(function(c) { return c.id === fromColId; });
    var toCol   = state.columns.find(function(c) { return c.id === toColId; });
    if (!fromCol || !toCol) return;

    var taskIdx = fromCol.tasks.findIndex(function(t) { return t.id === taskId; });
    if (taskIdx === -1) return;
    var task = fromCol.tasks.splice(taskIdx, 1)[0];

    if (beforeTaskId === null) {
      toCol.tasks.push(task);
    } else {
      var insertIdx = toCol.tasks.findIndex(function(t) { return t.id === beforeTaskId; });
      if (insertIdx === -1) toCol.tasks.push(task);
      else toCol.tasks.splice(insertIdx, 0, task);
    }

    save();
    render();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  addColBtn.addEventListener('click', addColumn);

  loadFromServer();
</script>
</body>
</html>
